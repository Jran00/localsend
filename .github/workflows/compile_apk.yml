name: Compile Optimized APK (Slim & Fixed 400 Error)

on:
  workflow_dispatch:

env:
  # 建议使用稳定版本，避免开发版/预览版在处理 HTTP Stream 时出现非预期行为
  FLUTTER_VERSION: "3.27.0" 
  RUST_VERSION: "1.84.1"
  APK_BUILD_DIR: "/tmp/build"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' app/pubspec.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_apk:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 【关键修复 1】：暂时注释掉该步骤，排除因核心依赖缺失导致的上传失败
      # - name: Remove proprietary dependencies
      #   run: sh scripts/remove_proprietary_dependencies.sh

      - name: Copy files to env.APK_BUILD_DIR
        run: |
          mkdir -p ${{ env.APK_BUILD_DIR }}
          cp -r . ${{ env.APK_BUILD_DIR }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          override: true
          default: true

      - name: Dependencies
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: flutter pub get

      # 【关键修复 2】：强制 Debug 签名时，同步禁用 R8 混淆，防止 FileDto 模型类被抹除导致 400
      - name: Force Debug Signing & Disable Shrinking
        working-directory: ${{ env.APK_BUILD_DIR }}/app/android/app
        run: |
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g' build.gradle
          # 这一行确保 Release 模式下不会因为混淆而破坏数据模型
          sed -i 's/minifyEnabled true/minifyEnabled false/g' build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' build.gradle

      # 【关键修复 3】：执行构建。增加 --no-tree-shake-icons 避免某些图标库导致的资源错误
      - name: Build Slim Release APK
        working-directory: ${{ env.APK_BUILD_DIR }}/app
        run: |
          flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Upload Optimized APKs
        uses: actions/upload-artifact@v4
        with:
          name: LocalSend-Slim-Fixed-v${{ needs.build.outputs.version }}
          path: |
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            ${{ env.APK_BUILD_DIR }}/app/build/app/outputs/flutter-apk/app-x86_64-release.apk
